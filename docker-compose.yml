version: '3.8'
services:
  db:
    image: mysql:latest
    restart: on-failure
    environment:
      MYSQL_ROOT_PASSWORD: db-221
      MYSQL_DATABASE: db-221
    ports:
      - "3306:3306"
    volumes:
      - my-db-volume:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: on-failure
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: db-221
    ports:
      - "8080:80"
      
volumes:
  my-db-volume:
